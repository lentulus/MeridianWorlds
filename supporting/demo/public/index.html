<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worlds — System Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }

    /* Search bar */
    #search-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      max-width: 480px;
    }

    #search-input {
      flex: 1;
      padding: 0.55rem 0.9rem;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #c9d1d9;
      font-size: 1rem;
      outline: none;
    }
    #search-input:focus { border-color: #388bfd; }

    button {
      padding: 0.55rem 1.2rem;
      border-radius: 6px;
      border: 1px solid #388bfd;
      background: #1f6feb;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #388bfd; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Status messages */
    #status {
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      color: #8b949e;
      min-height: 1.2em;
    }
    #status.error { color: #f85149; }

    /* Main layout: info panel left, body table right */
    #result {
      display: none;
      gap: 2rem;
      align-items: flex-start;
    }
    #result.visible {
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    /* Info panel */
    .info-panel { display: flex; flex-direction: column; gap: 1rem; }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem 1.2rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 0.7rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #30363d;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 0.2rem 0;
      gap: 0.5rem;
    }
    .stat-label { color: #8b949e; }
    .stat-value { color: #c9d1d9; text-align: right; }

    .spectral-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #21262d;
      color: #79c0ff;
      margin-top: 0.3rem;
    }

    .hz-badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.75rem;
      background: #1a4f1a;
      color: #56d364;
      margin-left: 0.4rem;
    }

    /* Body table */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      text-align: left;
      padding: 0.5rem 0.7rem;
      color: #8b949e;
      font-weight: 500;
      border-bottom: 1px solid #30363d;
      white-space: nowrap;
    }

    tbody tr:hover { background: #161b22; }

    tbody td {
      padding: 0.45rem 0.7rem;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
      white-space: nowrap;
    }

    .hz-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #56d364;
      vertical-align: middle;
      margin-left: 4px;
    }

    .body-type {
      color: #79c0ff;
      font-size: 0.8rem;
    }

    .world-type {
      color: #c9d1d9;
      font-size: 0.8rem;
    }

    .atmo {
      color: #8b949e;
      font-size: 0.75rem;
      max-width: 180px;
      white-space: normal;
    }

    td.temp { color: #ffa657; }

    td.hab-pos { color: #56d364; }
    td.hab-neg { color: #f85149; }
    td.hab-zero { color: #8b949e; }

    @media (max-width: 800px) {
      #result.visible { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<h1>Worlds — Star System Browser</h1>

<form id="search-form">
  <input id="search-input" type="text" placeholder="System name, e.g. Sol, Alpha Cen…" autocomplete="off">
  <button type="submit" id="search-btn">Search</button>
</form>

<div id="status"></div>

<div id="result">
  <div class="info-panel">
    <div class="card" id="system-card">
      <h2 id="system-name"></h2>
      <div class="stat-row"><span class="stat-label">Distance</span><span class="stat-value" id="system-dist"></span></div>
      <div class="stat-row"><span class="stat-label">Age</span><span class="stat-value" id="system-age"></span></div>
      <div class="stat-row"><span class="stat-label">Bodies</span><span class="stat-value" id="system-bodies"></span></div>
    </div>
    <div class="card" id="stars-card">
      <h2>Stars</h2>
      <div id="stars-list"></div>
    </div>
  </div>

  <div class="table-wrap">
    <table id="bodies-table">
      <thead>
        <tr>
          <th>Orbit (AU)</th>
          <th>Type</th>
          <th>World</th>
          <th>Size (km)</th>
          <th>Atmosphere</th>
          <th>Temp (K)</th>
          <th>Habitability</th>
          <th>Moons</th>
        </tr>
      </thead>
      <tbody id="bodies-tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const form    = document.getElementById('search-form');
  const input   = document.getElementById('search-input');
  const btn     = document.getElementById('search-btn');
  const status  = document.getElementById('status');
  const result  = document.getElementById('result');

  function fmt(n, decimals = 2) {
    if (n == null) return '—';
    return Number(n).toFixed(decimals);
  }

  function bodyTypeLabel(raw) {
    return raw
      .replace(/_/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function tempColour(tempK) {
    if (tempK == null) return '';
    if (tempK < 200)  return 'cold';
    if (tempK > 500)  return 'temp';  // reuse orange class
    return '';
  }

  function habClass(val) {
    if (val == null || val === '0') return 'hab-zero';
    return Number(val) > 0 ? 'hab-pos' : 'hab-neg';
  }

  function renderStars(stars) {
    const list = document.getElementById('stars-list');
    list.innerHTML = '';
    for (const s of stars) {
      const div = document.createElement('div');
      div.style.marginBottom = '0.8rem';
      div.innerHTML = `
        <div class="stat-row">
          <span class="stat-label">Component ${s.component}</span>
          <span class="stat-value">
            <span class="spectral-badge">${s.spectral}</span>
            ${s.hz_eligible ? '<span class="hz-badge">HZ</span>' : ''}
          </span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Luminosity</span>
          <span class="stat-value">${fmt(s.luminosity_sol)} L☉</span>
        </div>`;
      list.appendChild(div);
    }
  }

  function renderBodies(bodies) {
    const tbody = document.getElementById('bodies-tbody');
    tbody.innerHTML = '';
    for (const b of bodies) {
      const tr = document.createElement('tr');
      const hVal = b.habitability;
      const hClass = habClass(hVal);
      tr.innerHTML = `
        <td>${fmt(b.orbit_au, 3)}${b.in_hz ? '<span class="hz-dot" title="Habitable zone"></span>' : ''}</td>
        <td class="body-type">${bodyTypeLabel(b.body_type)}</td>
        <td class="world-type">${b.world_type ?? '—'}</td>
        <td>${fmt(b.size_km, 0)}</td>
        <td class="atmo">${b.atmosphere ?? '—'}</td>
        <td class="${b.temp_k != null && b.temp_k > 500 ? 'temp' : ''}">${b.temp_k != null ? Math.round(b.temp_k) : '—'}</td>
        <td class="${hClass}">${hVal ?? '—'}</td>
        <td>${b.moonlet_count > 0 ? b.moonlet_count : '—'}</td>`;
      tbody.appendChild(tr);
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = input.value.trim();
    if (!name) return;

    btn.disabled = true;
    status.className = '';
    status.textContent = 'Searching…';
    result.classList.remove('visible');

    try {
      const res = await fetch(`/api/system?name=${encodeURIComponent(name)}`);
      const data = await res.json();

      if (!res.ok) {
        status.className = 'error';
        status.textContent = data.error ?? 'Unknown error';
        return;
      }

      // System card
      document.getElementById('system-name').textContent = data.name;
      document.getElementById('system-dist').textContent =
        data.dist_ly === 0 ? 'Local (0 ly)' : `${data.dist_ly} ly`;
      document.getElementById('system-age').textContent =
        data.age_gyr != null ? `${data.age_gyr} Gyr` : '—';
      document.getElementById('system-bodies').textContent = data.bodies.length;

      renderStars(data.stars);
      renderBodies(data.bodies);

      status.textContent = `Found: ${data.name} — ${data.bodies.length} bodies`;
      result.classList.add('visible');
    } catch (err) {
      status.className = 'error';
      status.textContent = 'Network error — is the server running?';
    } finally {
      btn.disabled = false;
    }
  });

  // Allow pressing Enter to submit.
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') form.requestSubmit();
  });
</script>

</body>
</html>
